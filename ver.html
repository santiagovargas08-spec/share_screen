<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cine Móvil - AutoConnect</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { background-color: black; color: white; margin: 0; font-family: Arial; overflow: hidden; position: relative;}
        #capa-inicio { position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; text-align: center;}
        
        button { padding: 18px; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; width: 100%; max-width: 350px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer;}
        #btn-iniciar { background: #e50914; }
        #btn-reproducir { background: #007bff; display: none; margin-top: 15px; animation: latir 1.5s infinite; }
        
        @keyframes latir { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        #video-pantalla { width: 100vw; height: 100vh; object-fit: contain; background: #000; }
        .contenedor-camaras { position: fixed; bottom: 30px; right: 15px; display: flex; gap: 8px; z-index: 1000; }
        video.cam { width: 100px; height: 75px; border-radius: 8px; object-fit: cover; background: #111; border: 2px solid #555;}
    </style>
</head>
<body>

    <div id="capa-inicio">
        <h2>Cine Móvil</h2>
        <p style="color: #888; margin-bottom: 30px;">Conexión automática configurada</p>
        
        <button id="btn-iniciar">1. ENCENDER SISTEMA</button>
        <p id="texto-estado" style="color: #888; margin-top: 15px;">Paso 1 de 2</p>

        <button id="btn-reproducir">2. 🎬 REPRODUCIR PELÍCULA</button>
    </div>

    <video id="video-pantalla" playsinline></video>

    <div class="contenedor-camaras">
        <video id="mi-camara" class="cam" autoplay muted playsinline></video>
        <video id="camara-pareja" class="cam" playsinline></video>
    </div>

    <script>
        const MI_ID_CLIENTE = 'cine-pareja-cliente'; // ID Fijo para el celular

        const peer = new Peer(MI_ID_CLIENTE, { 
            config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } 
        }); 
        
        let miStreamCelular;
        let paqueteRecibido = null;
        
        const vPantalla = document.getElementById('video-pantalla');
        const vMiCamara = document.getElementById('mi-camara');
        const vCamaraPareja = document.getElementById('camara-pareja');
        const btnIniciar = document.getElementById('btn-iniciar');
        const btnReproducir = document.getElementById('btn-reproducir');
        const textoEstado = document.getElementById('texto-estado');

        // --- SISTEMA DE AUTORECONEXIÓN ---
        peer.on('disconnected', () => {
            console.log("Desconectado del servidor de señalización. Reconectando...");
            peer.reconnect();
        });

        // --- ANTI-CORTES: Si ella sale a responder un WhatsApp y vuelve ---
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === 'visible') {
                // Al volver a la app, forzamos a los reproductores a despertar
                console.log("Pestaña visible nuevamente. Forzando Play...");
                vPantalla.play().catch(e => console.log(e));
                vCamaraPareja.play().catch(e => console.log(e));
            }
        });

        btnIniciar.onclick = async () => {
            try {
                if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});

                miStreamCelular = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                vMiCamara.srcObject = miStreamCelular;

                btnIniciar.style.display = 'none';
                textoEstado.innerText = "Esperando a que Santiago envíe la señal...";
                textoEstado.style.color = "#28a745";
            } catch(e) {
                alert("Debes permitir la cámara y micrófono.");
            }
        };

        peer.on('call', llamada => {
            llamada.answer(miStreamCelular); 
            
            llamada.on('stream', paqueteRemoto => {
                paqueteRecibido = paqueteRemoto;
                textoEstado.style.display = 'none';
                btnReproducir.style.display = 'block';
                if (navigator.vibrate) navigator.vibrate(200);
            });
        });

        btnReproducir.onclick = () => {
            document.getElementById('capa-inicio').style.display = 'none';

            const videos = paqueteRecibido.getVideoTracks();
            const audios = paqueteRecibido.getAudioTracks();

            if (videos[0]) {
                const streamSerie = new MediaStream([videos[0]]);
                audios.forEach(track => streamSerie.addTrack(track));
                vPantalla.srcObject = streamSerie;
                vPantalla.play().catch(e => alert("Error al reproducir pantalla: " + e));
            }

            if (videos[1]) {
                const streamNovio = new MediaStream([videos[1]]);
                vCamaraPareja.srcObject = streamNovio;
                vCamaraPareja.play().catch(e => console.log(e));
            }
        };
    </script>
</body>
</html>
