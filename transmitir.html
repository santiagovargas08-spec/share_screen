<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Transmisor con Webcams</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: Arial; padding: 20px; }
        button { padding: 10px; margin: 5px; color: white; border: none; cursor: pointer; border-radius: 5px; }
        /* El contenedor flotante para las camaritas */
        .contenedor-camaras {
            position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000;
        }
        video.cam { width: 150px; height: 110px; border-radius: 8px; object-fit: cover; background: #000; }
        #mi-camara { border: 2px solid #888; }
        #camara-pareja { border: 2px solid #e50914; }
    </style>
</head>
<body>
    <h2>Panel de Transmisión VIP</h2>
    <p>Tu ID: <strong id="mi-id">Cargando...</strong></p>
    
    <button id="btn-camara" style="background: #007bff;">1. Encender mi Cámara y Micrófono</button>
    <button id="btn-pantalla" style="background: #e50914;">2. Capturar Pantalla (Serie)</button>
    <br><br>
    <input type="text" id="id-pareja" placeholder="ID de tu pareja" style="padding: 10px; width: 200px;">
    <button id="btn-conectar" style="background: #28a745;">3. Iniciar Cine y Videollamada</button>

    <div class="contenedor-camaras">
        <video id="mi-camara" class="cam" autoplay muted></video> <video id="camara-pareja" class="cam" autoplay></video>
    </div>

    <script>
        const peer = new Peer(); 
        let streamPantalla;
        let streamCamara;

        peer.on('open', id => document.getElementById('mi-id').innerText = id);

        // 1. Encender tu cámara y micrófono
        document.getElementById('btn-camara').onclick = async () => {
            streamCamara = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('mi-camara').srcObject = streamCamara;
        };

        // 2. Capturar la serie
        document.getElementById('btn-pantalla').onclick = async () => {
            streamPantalla = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
        };

        // 3. Conectar todo con tu pareja
        document.getElementById('btn-conectar').onclick = () => {
            const idPareja = document.getElementById('id-pareja').value;
            if(!streamPantalla || !streamCamara) return alert("¡Enciende la cámara y captura la pantalla primero!");

            // Llamada A: Enviar solo la pantalla (Identificada con metadata)
            peer.call(idPareja, streamPantalla, { metadata: { tipo: 'serie' } });

            // Llamada B: Enviar tu cámara y recibir la de ella en respuesta
            const llamadaCamara = peer.call(idPareja, streamCamara, { metadata: { tipo: 'webcams' } });
            llamadaCamara.on('stream', streamRemoto => {
                document.getElementById('camara-pareja').srcObject = streamRemoto;
            });
            
            alert("¡Conexión enviada!");
        };
    </script>
</body>
</html>
